<!DOCTYPE html>
<html>

<head>
    <title>Postway</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css">
    <link rel="stylesheet" type="text/css" href="../css/loader.css">
<script type="module">
    import { isLogin , redirectTo} from "../js/router.js";
    import { handlePostwayURLState} from "../js/postway.script.js";

    (async function () {
        const allowed = await isLogin();   // returns true only if route is allowed
        if (!allowed){
            redirectTo("/frontend/html/login.html") 
            return
        }; // stop executing on redirect
        await handlePostwayURLState();   // load URL-state logic
    })();
</script>
</head>

<body>
    <div class="main">
        <aside class="left">
            <div class="header"><img src="../media/postway.jpg"><span>Postway</span></div>
            <div class="container">
                <div class="wrapper">
                    <div class="options">
                        <div class="home"><span></span>Home</div>
                        <div class="draft "><span></span>Draft</div>
                        <div class="posts "><span></span>Posts</div>
                        <div class="bookmark"><span></span>Bookmarks</div>

                    </div>
                </div>
                <!-- <button class="postButton" type="button">post</button> -->
                <div id="userId" class="footerLeft"><span></span>
                    <p></p>
                </div>
            </div>

        </aside>
        <aside class="right">
            <div class="header">Header</div>
            <div class=".popup center"></div>
            <div class="postBox">
                <div class="postBox-left">
                    <img class="avatar" src="../media/profile.png">
                </div>

                <div class="postBox-right">
                    <textarea id="caption" placeholder="What's happening?" rows="2"></textarea>

                    <div class="postBox-actions">
                        <label for="imageInput" class="post-icon">
                            <img src="../media/image-gallery.png" alt="Upload">
                        </label>
                        <input type="file" id="imageInput" accept="image/*">
                        <button id="postButton" type="button" class="post-btn">Post</button>
                    </div>

                    <!-- Image preview -->
                    <div id="previewContainer"></div>
                </div>
            </div>
            <div class="containerRight">
                <!-- Dynamic Content Come here -->
            </div>
            <div class="pagination"></div>
        </aside>
    </div>


    <script type="module" src="../js/postway.script.js"></script>

</body>

</html>
